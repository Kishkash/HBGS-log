{% extends "base.html" %}
{% block content %}
<h1>Group Board Game Stats</h1>

<label>
    Period:
    <select id="period">
        <option value="overall">Overall</option>
        <option value="year">Year</option>
        <option value="month">Month</option>
        <option value="date">Date</option>
    </select>
</label>

<span id="year-wrap">
    Year: <input type="number" id="year" min="2000" max="2100">
</span>

<span id="month-wrap" style="display:none;">
    Month: <input type="number" id="month" min="1" max="12">
</span>

<span id="date-wrap" style="display:none;">
    Date: <input type="date" id="date">
</span>

<button id="load">Load</button>

<div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Box</th>
                <th>Game</th>
                <th>Plays</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<script>
    const periodEl = document.getElementById('period');
    const yearWrap = document.getElementById('year-wrap');
    const monthWrap = document.getElementById('month-wrap');
    const dateWrap = document.getElementById('date-wrap');

    periodEl.addEventListener('change', () => {
        const p = periodEl.value;
        yearWrap.style.display = (p === 'year' || p === 'month') ? 'inline' : 'none';
        monthWrap.style.display = (p === 'month') ? 'inline' : 'none';
        dateWrap.style.display = (p === 'date') ? 'inline' : 'none';
    });

    async function loadStats() {
        const period = periodEl.value;
        const params = new URLSearchParams({ period });

        if (period === 'year') {
            const y = document.getElementById('year').value;
            if (!y) return alert("Enter year");
            params.append('year', y);
        } else if (period === 'month') {
            const y = document.getElementById('year').value;
            const m = document.getElementById('month').value;
            if (!y || !m) return alert("Enter year and month");
            params.append('year', y);
            params.append('month', m);
        } else if (period === 'date') {
            const d = document.getElementById('date').value;
            if (!d) return alert("Select date");
            params.append('date', d);
        }

        const res = await fetch('/api/stats?' + params.toString());
        const data = await res.json();
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = '';

        data.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${row.index}</td>
                <td>${row.image_url ? `<img src="${row.image_url}" style="max-width:50px">` : ''}</td>
                <td>${row.game_name}</td>
                <td>${row.plays}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // One single DOMContentLoaded block
    document.addEventListener('DOMContentLoaded', () => {
        // Hide all inputs on first load
        yearWrap.style.display = 'none';
        monthWrap.style.display = 'none';
        dateWrap.style.display = 'none';

        // Load overall stats automatically
        loadStats();
    });

    document.getElementById('load').addEventListener('click', loadStats);
</script>
{% endblock %}
